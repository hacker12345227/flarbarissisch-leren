<!DOCTYPE html>
<html lang="nl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Les</title>

<link rel="stylesheet" href="../css/style.css">
<link rel="icon" href="../favicon.png">

</head>

<body>

<div class="page-shell">

<header class="topbar">

<div class="brand">

<div class="brand-badge">📖</div>

<div>
<h1 id="lessonTitle">Les</h1>
<p>Leer nieuwe woorden</p>
</div>

</div>

<nav class="nav">

<a class="nav-link" href="../">Home</a>
<a class="nav-link" href="../hoofdstukken/">Hoofdstukken</a>
<a class="nav-link" href="../flashcards/">Flashcards</a>
<a class="nav-link" href="../quiz/">Quiz</a>
<a class="nav-link" href="../grammatica/">Grammatica</a>

</nav>

</header>

<main class="container">

<div class="card">

<div class="table-wrap">

<table class="word-table">

<thead>

<tr>
<th>Nederlands</th>
<th>Flarbarissisch</th>
<th>Audio</th>
<th>Geleerd</th>
</tr>

</thead>

<tbody id="lessonWords"></tbody>

</table>

</div>

</div>

</main>

</div>

<script src="../js/chapters.js"></script>
<script src="../js/script.js"></script>

<script>

/* wacht tot dictionary geladen is */

function waitForDictionary(){

if(!window.dictionary || Object.keys(dictionary).length === 0){

setTimeout(waitForDictionary,100)

return

}

loadLesson()

}

function loadLesson(){

const params = new URLSearchParams(window.location.search)

const chapterId = params.get("chapter")

if(!chapterId){

document.getElementById("lessonTitle").innerText =
"Geen hoofdstuk geselecteerd"

return

}

const chapter = chapters.find(c => c.id == chapterId)

if(!chapter){

document.getElementById("lessonTitle").innerText =
"Hoofdstuk niet gevonden"

return

}

document.getElementById("lessonTitle").innerText =
"Hoofdstuk " + chapter.id + " – " + chapter.title

const table = document.getElementById("lessonWords")

table.innerHTML = ""

chapter.words.forEach(word => {

const flar = dictionary[word]

if(!flar) return

const row = document.createElement("tr")

row.innerHTML = `

<td>${word}</td>

<td>${flar}</td>

<td>
<button class="icon-btn"
onclick="speak('${flar}')">
🔊
</button>
</td>

<td>
<button class="icon-btn"
onclick="markLearned('${word}')">
✔
</button>
</td>

`

table.appendChild(row)

})

}

waitForDictionary()

</script>

</body>
</html>
