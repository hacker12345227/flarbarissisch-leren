<script src="../js/chapters.js"></script>
<script src="../js/script.js"></script>

<script>

/* wacht tot dictionary geladen is */

function waitForDictionary(){

if(!window.entries || entries.length === 0){

setTimeout(waitForDictionary,100)

return

}

loadLesson()

}

function loadLesson(){

const params = new URLSearchParams(location.search)

const chapterId = params.get("chapter")

if(!chapterId) return

const chapter = getChapter(chapterId)

if(!chapter) return

const table = document.getElementById("lessonWords")

const title = document.getElementById("lessonTitle")

if(title){
title.innerText = "Hoofdstuk " + chapter.id + " – " + chapter.title
}

chapter.words.forEach(word => {

if(!dictionary[word]) return

const tr = document.createElement("tr")

tr.innerHTML = `

<td>${word}</td>

<td>${dictionary[word]}</td>

<td>
<button onclick="speak('${dictionary[word]}')">
🔊
</button>
</td>

<td>
<button onclick="markLearned('${word}')">
✔
</button>
</td>

`

table.appendChild(tr)

})

}

/* markeer woord als geleerd */

function markLearned(word){

let learned = JSON.parse(localStorage.getItem("learnedWords") || "[]")

if(!learned.includes(word)){

learned.push(word)

localStorage.setItem("learnedWords", JSON.stringify(learned))

}

updateStats()

}

/* start */

waitForDictionary()

</script>
