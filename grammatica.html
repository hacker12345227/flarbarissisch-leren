<h1>📘 Grammatica</h1>

<h2>Zinsopbouw</h2>

<p>
De zinsopbouw is hetzelfde als Nederlands:
</p>

<p>
Onderwerp + Werkwoord + Rest
</p>

<h3>Voorbeeld</h3>

<p>Nederlands:</p>
<p><b>Ik ga naar huis</b></p>

<p>Flarbarissisch:</p>
<p><b>Zlu blar naar flaren</b></p>

<h2>Werkwoorden</h2>

<p>
Werkwoorden vervoegen net als Nederlands.
</p>
