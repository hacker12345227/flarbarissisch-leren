<main>

<div class="quizCard">

<h2 id="question">laden...</h2>

<div id="answers"></div>

<p id="result"></p>

<p>Score: <span id="score">0</span></p>

</div>

</main>

<script src="../js/script.js"></script>

<script>

let score = 0

function initQuiz(){

if(entries.length === 0) return

nextQuestion()

}

function nextQuestion(){

const keys = Object.keys(dictionary)

const correct = keys[Math.floor(Math.random()*keys.length)]

const flar = dictionary[correct]

document.getElementById("question").innerText =
`Wat betekent "${flar}"?`

const answers = document.getElementById("answers")

answers.innerHTML = ""

let options = [correct]

while(options.length < 4){

let rand = keys[Math.floor(Math.random()*keys.length)]

if(!options.includes(rand)){
options.push(rand)
}

}

options.sort(()=>Math.random()-0.5)

options.forEach(opt => {

const btn = document.createElement("button")

btn.innerText = opt

btn.onclick = () => {

if(opt === correct){

document.getElementById("result").innerText = "✅ Goed!"

score++

localStorage.setItem("quizScore", score)

}else{

document.getElementById("result").innerText =
`❌ Fout (goed: ${correct})`

}

document.getElementById("score").innerText = score

setTimeout(nextQuestion,1000)

}

answers.appendChild(btn)

})

}

/* wachten tot dictionary geladen is */

setTimeout(initQuiz,500)

</script>

</body>
