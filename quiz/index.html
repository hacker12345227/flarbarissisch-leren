<!DOCTYPE html>
<html lang="nl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quiz</title>

<link rel="stylesheet" href="../css/style.css">
<link rel="icon" href="../favicon.png">

</head>

<body>

<div class="page-shell">

<header class="topbar">

<div class="brand">

<div class="brand-badge">🧠</div>

<div>
<h1>Quiz</h1>
<p>Test je Flarbarissisch</p>
</div>

</div>

<nav class="nav">

<a class="nav-link" href="../">Home</a>
<a class="nav-link" href="../hoofdstukken/">Hoofdstukken</a>
<a class="nav-link" href="../flashcards/">Flashcards</a>
<a class="nav-link active" href="../quiz/">Quiz</a>
<a class="nav-link" href="../grammatica/">Grammatica</a>

</nav>

</header>

<main class="container">

<section class="quiz-card card">

<div class="quiz-top">

<div class="mini-stat">
Score: <span id="quizScoreDisplay">0</span>
</div>

<div class="mini-stat">
Vraag: <span id="questionNumber">1</span>
</div>

</div>

<h2 id="question">...</h2>

<div id="answers" class="answers-grid"></div>

<p id="result" class="quiz-feedback"></p>

</section>

</main>

</div>

<script src="../js/script.js"></script>

<script>

/* wachten tot dictionary geladen is */

function waitForDictionary(){

if(!window.dictionary || Object.keys(dictionary).length === 0){

setTimeout(waitForDictionary,100)

return

}

startQuiz()

}

/* quiz state */

let quizScore = 0
let questionCount = 0

function startQuiz(){

nextQuestion()

}

/* nieuwe vraag */

function nextQuestion(){

questionCount++

const keys = Object.keys(dictionary)

const correctWord =
keys[Math.floor(Math.random()*keys.length)]

const flarWord = dictionary[correctWord]

const question = document.getElementById("question")
const answers = document.getElementById("answers")
const result = document.getElementById("result")

const scoreDisplay = document.getElementById("quizScoreDisplay")
const questionDisplay = document.getElementById("questionNumber")

if(scoreDisplay) scoreDisplay.innerText = quizScore
if(questionDisplay) questionDisplay.innerText = questionCount

if(question){

question.innerText =
`Wat betekent "${flarWord}"?`

}

answers.innerHTML = ""
result.innerText = ""

/* opties maken */

let options = [correctWord]

while(options.length < 4){

let rand =
keys[Math.floor(Math.random()*keys.length)]

if(!options.includes(rand)){

options.push(rand)

}

}

options.sort(()=>Math.random()-0.5)

/* knoppen maken */

options.forEach(opt => {

const btn = document.createElement("button")

btn.className = "answer-btn"

btn.innerText = opt

btn.onclick = () => {

if(opt === correctWord){

btn.classList.add("correct")

result.innerText = "✅ Goed!"

quizScore++

}else{

btn.classList.add("wrong")

result.innerText =
`❌ Fout — goed: ${correctWord}`

}

/* score opslaan */

localStorage.setItem("quizScore", quizScore)

/* volgende vraag */

setTimeout(nextQuestion,1000)

}

answers.appendChild(btn)

})

}

/* start */

waitForDictionary()

</script>

</body>

</html>
