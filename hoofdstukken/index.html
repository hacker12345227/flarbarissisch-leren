<!DOCTYPE html>
<html lang="nl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hoofdstukken</title>

<link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div class="page-shell">

<header class="topbar">

<div class="brand">
<div class="brand-badge">📚</div>

<div>
<h1>Hoofdstukken</h1>
<p>Leer woorden per onderwerp</p>
</div>
</div>

<nav class="nav">
<a class="nav-link" href="../">Home</a>
<a class="nav-link active" href="../hoofdstukken/">Hoofdstukken</a>
<a class="nav-link" href="../flashcards/">Flashcards</a>
<a class="nav-link" href="../quiz/">Quiz</a>
<a class="nav-link" href="../grammatica/">Grammatica</a>
</nav>

</header>

<main class="container">

<div id="chaptersContainer" class="home-grid"></div>

</main>

</div>

<script src="../js/chapters.js"></script>

<script>

const container = document.getElementById("chaptersContainer")

chapters.forEach(ch => {

const card = document.createElement("div")

card.className = "feature card"

card.innerHTML = `
<h3>Hoofdstuk ${ch.id}</h3>
<p>${ch.title}</p>
<a class="text-link" href="../les/?chapter=${ch.id}">
Start →
</a>
`

container.appendChild(card)

})

</script>

</body>
</html>
