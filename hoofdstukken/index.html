/* container */

const container =
document.getElementById("chaptersContainer")

/* hoofdstukken tonen */

chapters.forEach(ch => {

card.className = "feature card"

card.innerHTML = `

href="../les/?chapter=${ch.id}">

</a>

`

container.appendChild(card)

})
